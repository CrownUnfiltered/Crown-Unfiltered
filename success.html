<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CROWN — Thanks</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0a; color: #fff; font-family: 'Space Mono', monospace; min-height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; }
.blue-top { position: fixed; top: 0; right: 0; width: 40%; height: 3px; background: #1400FF; }
.blue-bottom { position: fixed; bottom: 0; left: 0; width: 100%; height: 1.5px; background: #1400FF; }
h1 { font-family: 'Bebas Neue', sans-serif; font-size: 48px; letter-spacing: 2px; margin-bottom: 16px; }
h1 span { color: #1400FF; }
p { font-size: 13px; color: #888; line-height: 1.7; max-width: 400px; margin: 0 auto 32px; }
a { display: inline-block; color: #1400FF; font-family: 'Bebas Neue', sans-serif; font-size: 16px; letter-spacing: 3px; text-decoration: none; border-bottom: 1px solid #1400FF; padding-bottom: 2px; }
</style>
</head>
<body>
<div class="blue-top"></div>
<div class="blue-bottom"></div>
<div>
  <h1>YOU'RE <span>IN</span></h1>
  <p>Sam will be in touch personally within 48 hours.</p>
  <a href="/">Back to media kit</a>
</div>
</body>
</html>
