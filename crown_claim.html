<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CROWN — Claim Your Spot</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0a; color: #fff; font-family: 'Space Mono', monospace; min-height: 100vh; display: flex; align-items: center; justify-content: center; }

.noise { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9999; opacity: 0.03;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}

.blue-top { position: fixed; top: 0; right: 0; width: 40%; height: 3px; background: #1400FF; }
.blue-bottom { position: fixed; bottom: 0; left: 0; width: 100%; height: 1.5px; background: #1400FF; }

.container { max-width: 500px; width: 100%; padding: 40px 24px; }

h1 { font-family: 'Bebas Neue', sans-serif; font-size: 48px; letter-spacing: 2px; margin-bottom: 12px; }
h1 span { color: #1400FF; }

.sub { font-size: 13px; color: #888; line-height: 1.6; margin-bottom: 32px; }

input, select, textarea {
  width: 100%; background: #151515; border: 1px solid #222; padding: 14px 16px;
  color: #fff; font-family: 'Space Mono', monospace; font-size: 13px;
  outline: none; transition: border-color 0.3s; margin-bottom: 12px;
}
input:focus, select:focus, textarea:focus { border-color: #1400FF; }
select { color: #999; appearance: none; }
textarea { resize: vertical; }

button {
  width: 100%; background: #1400FF; color: #fff;
  font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 3px;
  padding: 16px; border: none; cursor: pointer; transition: background 0.3s; margin-top: 8px;
}
button:hover { background: #1000cc; }

.back { display: inline-block; margin-top: 20px; font-size: 12px; color: #444; text-decoration: none; transition: color 0.3s; }
.back:hover { color: #888; }
</style>
</head>
<body>

<div class="noise"></div>
<div id="gate" style="position:fixed;top:0;left:0;width:100%;height:100%;background:#0a0a0a;z-index:99999;display:flex;align-items:center;justify-content:center;">
  <div style="text-align:center;">
    <div style="font-family:'Bebas Neue',sans-serif;font-size:32px;color:#fff;letter-spacing:2px;margin-bottom:24px;">CROWN</div>
    <input id="pw" type="password" placeholder="Enter password" style="background:#151515;border:1px solid #222;padding:14px 16px;color:#fff;font-family:'Space Mono',monospace;font-size:13px;outline:none;width:250px;text-align:center;" onkeydown="if(event.key==='Enter')checkPw()">
    <br><br>
    <button onclick="checkPw()" style="background:#1400FF;color:#fff;font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:3px;padding:12px 36px;border:none;cursor:pointer;">ENTER</button>
    <p id="err" style="color:#E8593C;font-size:12px;margin-top:12px;font-family:'Space Mono',monospace;display:none;">Incorrect password</p>
  </div>
</div>
<script>
if(sessionStorage.getItem('crown_auth')==='true'){
  document.getElementById('gate').style.display='none';
}
function checkPw(){
  if(document.getElementById('pw').value==='crown2026'){
    sessionStorage.setItem('crown_auth','true');
    document.getElementById('gate').style.display='none';
  } else {
    document.getElementById('err').style.display='block';
  }
}
</script>

<div class="blue-top"></div>
<div class="blue-bottom"></div>

<div class="container">
  <h1>CLAIM YOUR <span>SPOT</span></h1>
  <p class="sub">Tell me who you are, what brand you represent, and which slot interests you. I'll come back to you personally within 48 hours.</p>

  <form method="POST" action="https://api.web3forms.com/submit">
  <input type="hidden" name="access_key" value="c6458799-cd39-4814-9d7c-1f25b944724b">
  <input type="hidden" name="redirect" value="https://crownunfiltered.com/success.html">
  <input type="hidden" name="subject" value="New Crown Sponsor Enquiry">
    <input type="text" placeholder="Your name">
    <input type="email" placeholder="Email">
    <input type="text" placeholder="Company / Brand">
    <select>
      <option value="" disabled selected>Which slot interests you?</option>
      <option value="title">Title Sponsor</option>
      <option value="supporting">Supporting Sponsor</option>
      <option value="founding">Founding Partner (all 3 slots)</option>
      <option value="unsure">Not sure yet — let's talk</option>
    </select>
    <textarea placeholder="Anything else?" rows="3"></textarea>
    <button type="submit">LET'S DO THIS</button>
  </form>

  <a href="index.html" class="back">← Back to media kit</a>
</div>

</body>
</html>
